name: "CareSync — notification-service CI/CD"

on:
  push:
    branches: [main]
    paths:
      - 'notification-service/**'
      - '.github/workflows/ci-cd-notification-service.yml'
  pull_request:
    branches: [main]
    paths:
      - 'notification-service/**'
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  SERVICE_NAME: notification-service
  SERVICE_PATH: notification-service
  ECR_REGISTRY: 664685894054.dkr.ecr.us-east-1.amazonaws.com
  ECR_REPO: caresync/notification-service
  AWS_REGION: us-east-1
  SONAR_PROJECT_KEY: caresync_notification_service
  HELM_VALUES_PATH: helm/values.yaml

jobs:
  sonarcloud:
    name: "SonarCloud Analysis"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          projectBaseDir: notification-service
          args: >
            -Dsonar.organization=care-sync-org
            -Dsonar.projectKey=care-sync-org_caresync-notification-service

      - name: Send Failure Notification Email
        if: failure()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 587
          username: ${{ secrets.SMTP_USERNAME }}
          password: ${{ secrets.SMTP_PASSWORD }}
          subject: "❌ SonarCloud Failed: CareSync notification-service"
          to: ${{ secrets.ALERT_EMAIL }}
          from: CareSync CI/CD <${{ secrets.SMTP_USERNAME }}>
          body: |
            The SonarCloud scan job failed for the notification-service.
            Check logs: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}

  build-and-snyk:
    name: "Build and Snyk Scan"
    needs: sonarcloud
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Dependencies
        run: |
          cd notification-service
          npm ci

      - name: Snyk Security Scan
        uses: snyk/actions/node@master
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          command: test
          args: --severity-threshold=high --file=notification-service/package.json
        continue-on-error: true

      - name: Send Failure Notification Email
        if: failure()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 587
          username: ${{ secrets.SMTP_USERNAME }}
          password: ${{ secrets.SMTP_PASSWORD }}
          subject: "❌ Build/Scan Failed: CareSync notification-service"
          to: ${{ secrets.ALERT_EMAIL }}
          from: CareSync CI/CD <${{ secrets.SMTP_USERNAME }}>
          body: |
            The build or Snyk security scan job failed for the notification-service.
            Check logs: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}

  docker-build-trivy-push:
    name: "Docker Build, Trivy Scan, and Push"
    needs: build-and-snyk
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.set_tag.outputs.image_tag }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Generate Semantic Version
        id: semver
        uses: mathieudutour/github-tag-action@v6.2
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          tag_prefix: "v"
          default_bump: patch
          initial_version: "1.0.0"
          dry_run: ${{ github.ref_name != 'main' }}

      - name: Set Image Tag
        id: set_tag
        run: |
          if [ "${{ github.ref_name }}" == "main" ]; then
            IMAGE_TAG="${{ steps.semver.outputs.new_tag }}"
          else
            SHORT_SHA=$(echo ${{ github.sha }} | cut -c1-8)
            IMAGE_TAG="${{ steps.semver.outputs.new_tag }}-prod-${SHORT_SHA}"
          fi
          echo "image_tag=$IMAGE_TAG" >> $GITHUB_OUTPUT
          echo "Image tag: $IMAGE_TAG"

      - name: Configure AWS Credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        run: |
          aws ecr get-login-password --region ${{ env.AWS_REGION }} | docker login --username AWS --password-stdin ${{ env.ECR_REGISTRY }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker Image locally for Trivy Scan
        run: |
          docker buildx build --platform linux/amd64 --load -t ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPO }}:${{ steps.set_tag.outputs.image_tag }} -f notification-service/Dockerfile notification-service

      - name: Run Trivy Vulnerability Scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: '${{ env.ECR_REGISTRY }}/${{ env.ECR_REPO }}:${{ steps.set_tag.outputs.image_tag }}'
          format: 'table'
          exit-code: '1'
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'
        continue-on-error: true

      - name: Push Docker Image to ECR
        run: |
          docker push ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPO }}:${{ steps.set_tag.outputs.image_tag }}
          docker tag ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPO }}:${{ steps.set_tag.outputs.image_tag }} ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPO }}:latest
          docker push ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPO }}:latest

      - name: Send ECR Push Failure Email
        if: failure()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 587
          username: ${{ secrets.SMTP_USERNAME }}
          password: ${{ secrets.SMTP_PASSWORD }}
          subject: "❌ ECR Push Failed: CareSync notification-service"
          to: ${{ secrets.ALERT_EMAIL }}
          from: CareSync CI/CD <${{ secrets.SMTP_USERNAME }}>
          body: |
            Docker build & ECR push job failed for the notification-service.
            Check logs: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}

  approval-gate:
    name: "Approval Gate (main only)"
    needs: docker-build-trivy-push
    if: github.ref_name == 'main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
    environment: production
    runs-on: ubuntu-latest
    steps:
      - name: Send Approval Request Email
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 587
          username: ${{ secrets.SMTP_USERNAME }}
          password: ${{ secrets.SMTP_PASSWORD }}
          subject: "🚀 Action Required: CareSync notification-service Deploy Approval Needed"
          to: ${{ secrets.ALERT_EMAIL }}
          from: CareSync CI/CD <${{ secrets.SMTP_USERNAME }}>
          body: |
            notification-service image is ready for production deployment.
            Image tag: ${{ needs.docker-build-trivy-push.outputs.image_tag }}
            
            This pipeline is waiting for your manual approval in GitHub Actions environment.
            Approve at: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
            
      - name: Wait for Environment Approval
        run: echo "Deployment approved by manager in GitHub Actions!"

  update-helm-values:
    name: "Update GitOps Repo (ArgoCD)"
    needs: [docker-build-trivy-push, approval-gate]
    if: |
      always() &&
      needs.docker-build-trivy-push.result == 'success' &&
      (
        github.ref_name == 'main' && needs.approval-gate.result == 'success'
      )
    runs-on: ubuntu-latest
    steps:
      - name: Checkout GitOps Repository
        uses: actions/checkout@v4
        with:
          repository: care-sync-org/caresync-gitops
          token: ${{ secrets.MANIFEST_REPO_PAT }}
          path: gitops-repo
          ref: ${{ github.ref_name }}

      - name: Update Helm Values using yq
        run: |
          cd gitops-repo
          
          yq e '.services.notificationService.tag = "${{ needs.docker-build-trivy-push.outputs.image_tag }}"' -i helm/values-prod.yaml

      - name: Commit and Push Changes to GitOps Repo
        run: |
          cd gitops-repo
          git config user.name "CareSync CI Bot"
          git config user.email "ci@caresync.com"
          git add helm/
          git commit -m "ci: update notification-service image tag to ${{ needs.docker-build-trivy-push.outputs.image_tag }} [skip ci]"
          
          for i in {1..5}; do
            git pull --rebase origin main && git push origin HEAD:main && exit 0
            sleep 5
          done
          exit 1

      - name: Send Helm Update Success Email
        uses: dawidd6/action-send-mail@v3
        if: success()
        with:
          server_address: smtp.gmail.com
          server_port: 587
          username: ${{ secrets.SMTP_USERNAME }}
          password: ${{ secrets.SMTP_PASSWORD }}
          subject: "⛵ Helm Values Updated: CareSync notification-service"
          to: ${{ secrets.ALERT_EMAIL }}
          from: CareSync CI/CD <${{ secrets.SMTP_USERNAME }}>
          body: |
            The Helm values file has been updated with the new image tag.
            ArgoCD will automatically detect this change and sync the deployment.
            Image Tag: ${{ needs.docker-build-trivy-push.outputs.image_tag }}
