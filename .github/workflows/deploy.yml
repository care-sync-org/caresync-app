name: "CareSync — Deploy (Update Helm Tags & Sync ArgoCD)"

# ─── Triggers ─────────────────────────────────────────────────────────────────
# Triggered by build.yml dispatch.
on:
  workflow_dispatch:
    inputs:
      semantic_tag:
        description: 'Semantic Version tag to deploy (e.g. v1.0.5)'
        required: true
      sha_tag:
        description: 'Short SHA tag to deploy (e.g. prod-8f3a2b1)'
        required: true
      environment:
        description: 'Target environment'
        required: true
        default: 'prod'
      services:
        description: 'JSON array of services to update'
        required: false
        default: '["ai-service","appointment-service","auth-service","document-service","frontend","notification-service","user-service"]'

# ─── Permissions ──────────────────────────────────────────────────────────────
permissions:
  id-token: write  # OIDC → AWS
  contents: read

concurrency:
  group: helm-push-prod
  cancel-in-progress: false

env:
  AWS_REGION: us-east-1
  GITOPS_REPO: care-sync-org/caresync-gitops

jobs:
  # ════════════════════════════════════════════════════════════════════════════
  # JOB 1: Update image tags in caresync-gitops → ArgoCD auto-syncs
  # ════════════════════════════════════════════════════════════════════════════
  update-helm-tags:
    name: "Approval Gate & Update GitOps"
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Send Approval Request Email
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 587
          username: ${{ secrets.SMTP_USERNAME }}
          password: ${{ secrets.SMTP_PASSWORD }}
          subject: "🚀 Action Required: CareSync Production Deploy Approval Needed"
          to: ${{ secrets.ALERT_EMAIL }}
          from: CareSync CI/CD <${{ secrets.SMTP_USERNAME }}>
          body: |
            All CareSync services are ready for production deployment.
            Semantic Tag: ${{ github.event.inputs.semantic_tag }}
            SHA Tag: ${{ github.event.inputs.sha_tag }}
            Services: ${{ github.event.inputs.services }}

            This pipeline is waiting for your manual approval in GitHub Actions.
            Approve at: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}

      - name: Log approval
        run: |
          echo "Deployment approved"
          echo "Semantic tag : ${{ github.event.inputs.semantic_tag }}"
          echo "SHA tag      : ${{ github.event.inputs.sha_tag }}"
          echo "Approved by  : ${{ github.actor }}"
          echo "Time         : $(date -u)"

      - name: Checkout caresync-gitops repository
        uses: actions/checkout@v4
        with:
          repository: ${{ env.GITOPS_REPO }}
          token: ${{ secrets.MANIFEST_REPO_PAT }}
          ref: main
          path: gitops-repo

      - name: Install yq
        run: |
          sudo wget -qO /usr/local/bin/yq \
            https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq

      - name: Update image tags in helm/values-prod.yaml
        env:
          SERVICES: ${{ github.event.inputs.services || '["ai-service","appointment-service","auth-service","document-service","frontend","notification-service","user-service"]' }}
        run: |
          SEMANTIC_TAG="${{ github.event.inputs.semantic_tag }}"
          SHA_TAG="${{ github.event.inputs.sha_tag }}"
          BASE="gitops-repo"
          VALUES_FILE="${BASE}/helm/values-prod.yaml"

          echo "Semantic tag: $SEMANTIC_TAG"
          echo "SHA tag: $SHA_TAG"
          echo "Services to update: $SERVICES"

          declare -A YQ_PATHS
          YQ_PATHS["ai-service"]=".services.aiService.tag"
          YQ_PATHS["appointment-service"]=".services.appointmentService.tag"
          YQ_PATHS["auth-service"]=".services.authService.tag"
          YQ_PATHS["document-service"]=".services.documentService.tag"
          YQ_PATHS["frontend"]=".services.frontend.tag"
          YQ_PATHS["notification-service"]=".services.notificationService.tag"
          YQ_PATHS["user-service"]=".services.userService.tag"

          echo "$SERVICES" | jq -r '.[]' | while read SERVICE; do
            YQ_PATH="${YQ_PATHS[$SERVICE]}"
            if [ -z "$YQ_PATH" ]; then
              echo "⚠️  Unknown service: $SERVICE — skipping"
              continue
            fi
            yq e "${YQ_PATH} = \"${SHA_TAG}\"" -i "${VALUES_FILE}"
            echo "  ✅ ${SERVICE} → tag=${SHA_TAG}"
          done

          echo "✅ Helm values updated"

      - name: Commit and push to caresync-gitops
        run: |
          SEMANTIC_TAG="${{ github.event.inputs.semantic_tag }}"
          SHA_TAG="${{ github.event.inputs.sha_tag }}"

          cd gitops-repo
          git config user.name "CareSync CI Bot"
          git config user.email "ci@caresync.com"
          git add helm/values-prod.yaml

          if git diff --staged --quiet; then
            echo "ℹ️  No changes to commit (image tags already up to date)"
          else
            git commit -m "deploy(production): deploy ${SEMANTIC_TAG} (${SHA_TAG}) [skip ci]"
            for i in {1..5}; do
              git pull --rebase origin main && git push origin main && break
              echo "Retry ${i}/5 after git conflict..."
              sleep 5
            done
            echo "✅ Helm values committed on main — ArgoCD will auto-sync within 3 minutes"
          fi

      - name: Send Helm Update Success Email
        if: success()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 587
          username: ${{ secrets.SMTP_USERNAME }}
          password: ${{ secrets.SMTP_PASSWORD }}
          subject: "⛵ CareSync Production Deployed Successfully"
          to: ${{ secrets.ALERT_EMAIL }}
          from: CareSync CI/CD <${{ secrets.SMTP_USERNAME }}>
          body: |
            Production deployment completed successfully.
            
            Semantic Tag: ${{ github.event.inputs.semantic_tag }}
            SHA Tag: ${{ github.event.inputs.sha_tag }}
            Services: ${{ github.event.inputs.services }}
            
            ArgoCD will automatically detect this change and sync the deployment.

      - name: Send Helm Update Failure Email
        if: failure()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 587
          username: ${{ secrets.SMTP_USERNAME }}
          password: ${{ secrets.SMTP_PASSWORD }}
          subject: "❌ Deploy Failed: CareSync Production"
          to: ${{ secrets.ALERT_EMAIL }}
          from: CareSync CI/CD <${{ secrets.SMTP_USERNAME }}>
          body: |
            The GitOps deployment pipeline failed for production.
            Semantic Tag: ${{ github.event.inputs.semantic_tag }}
            SHA Tag: ${{ github.event.inputs.sha_tag }}
            Check logs: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
